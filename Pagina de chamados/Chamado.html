<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abrir chamados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="preloader" id="preloader">

	</div>
    <header>
        <div>
            <nav>
                <h1>
                    Abertura de chamados
                </h1>
            </nav>
        </div>   
    </header>
    <nav>
        <div>
            <fieldset>
            <form action="">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome"><br><br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email"><br><br>
                <label for="assunto">Assunto:</label>
                <input type="text" id="assunto" name="assunto"><br><br>
                <label for="descricao">Descrição do problema:</label><br>
                <textarea id="descricao" name="descricao" rows="4" cols="50"></textarea><br><br>
               
                <legend>Departamento</legend>
                <select name="Departamento" id="Departamento">
                    <option value="suporte">TI</option>
                    <option value="desenvolvimento">Financiero</option>
                    <option value="infraestrutura">Opera</option>
                    <option value="infraestrutura">Jurídico</option>
                    <option value="infraestrutura">Recursos Humanos</option>
                    <option value="infraestrutura">Marketing</option>
                    <option value="infraestrutura">Vendas</option>
                    <option value="infraestrutura">Logística</option>
                </select>
             
            </form>
            <br>
            <br>

           <a href="/Senai/Primeira pagina/index.html" ><button>Enviar</button></a>

        <script src="script.js"></script>

    </fieldset>
