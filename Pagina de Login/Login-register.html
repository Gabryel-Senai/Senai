<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login e Registro</title>
</head>
<body>
    <div class="preloader" id="preloader">
  		<div class="loader" id="loader"></div>
	</div>
    <header>
    <div>
        <nav>
            <a href="">Sistema de chamados Senai</a>
            <div class="menu">
                <a class="" href="index.html">Home</a>
                <a class="" href="/Senai/Sobre/Sobre.html">Sobre</a>
                <a class="" href="/Senai/Pagina de chamados/Chamado.html">Abrir chamados</a>
                <a class="" href="/Senai/Pagina de Login/Login-register.html">Login/Register</a>
            </div>
        </nav>
    </div>
    </header>
    <div class="container">
        <!-- Login -->
        <div class="form-section active" id="login">
            <h2>Login</h2>
            <form>
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="button" onclick="entrar()">Entrar</button>
            </form>
            <div class="toggle-link">
                Não tem conta? <a onclick="toggleForms()">Registre-se</a>
            </div>
        </div>

        <!-- Registro -->
        <div class="form-section" id="registro">
            <h2>Registro</h2>
            <form>
                <div class="form-group">
                    <label for="reg-name">Nome</label>
                    <input type="text" id="reg-name" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Senha</label>
                    <input type="password" id="reg-password" required>
                </div>
                <button type="button" onclick="registrar()">Registrar</button>
            </form>
            <div class="toggle-link">
                Já tem conta? <a onclick="toggleForms()">Faça login</a>
            </div>
        </div>
    </div>
    
    </div>
    
    <script src="script.js"></script>
</body>
</html>
